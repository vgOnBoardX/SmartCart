<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vashkar City Smart Shop </title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    :root {
      --bg: #0d0f1a;
      --bg-card: rgba(255, 255, 255, 0.05);
      --primary: #6c63ff;
      --primary-dk: #4b44cc;
      --accent: #ff6584;
      --gold: #f9c74f;
      --green: #43e97b;
      --text: #e8eaf6;
      --text-muted: #9094b8;
      --border: rgba(108, 99, 255, 0.20);
      --radius: 18px;
      --radius-sm: 10px;
      --shadow: 0 8px 32px rgba(108, 99, 255, 0.18), 0 2px 8px rgba(0, 0, 0, 0.28);
      --shadow-hover: 0 20px 56px rgba(108, 99, 255, 0.34), 0 6px 20px rgba(0, 0, 0, 0.36);
      --trans: all 0.38s cubic-bezier(0.23, 1, 0.32, 1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 18% 8%, rgba(108, 99, 255, 0.15) 0%, transparent 52%),
        radial-gradient(ellipse at 82% 92%, rgba(255, 101, 132, 0.10) 0%, transparent 52%);
      min-height: 100vh;
      color: var(--text);
      padding: 0 0 3rem;
    }

    /* ── PAGE HEADER ── */
    h1 {
      text-align: center;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.15;
      padding: 2.6rem 1rem 1.8rem;
      background: linear-gradient(135deg, #a29bfe 0%, #6c63ff 45%, #ff6584 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
    }

    h1::after {
      content: '🛍️ Premium Picks, Unbeatable Prices';
      display: block;
      font-size: 0.88rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      -webkit-text-fill-color: var(--text-muted);
      color: var(--text-muted);
      margin-top: 0.5rem;
      background: none;
      -webkit-background-clip: unset;
      background-clip: unset;
    }

    /* ── PRODUCTS GRID ── */
    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.6rem;
      margin-top: 2.4rem;
      padding: 0 1.4rem;
    }

    /* ── PRODUCT CARD ── */
    .product {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 230px;
      text-align: center;
      padding: 1.8rem 1.3rem 1.4rem;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: var(--trans);
      position: relative;
      overflow: hidden;
    }

    /* Gradient top accent line */
    .product::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    /* Subtle inner glow on hover */
    .product::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      background: radial-gradient(ellipse at 50% 0%, rgba(108, 99, 255, 0.10) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .product:hover {
      transform: translateY(-12px) scale(1.025);
      box-shadow: var(--shadow-hover);
      border-color: rgba(108, 99, 255, 0.48);
    }

    .product:hover::before {
      opacity: 1;
    }

    .product:hover::after {
      opacity: 1;
    }

    /* Product name */
    .product h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 0.6rem;
      letter-spacing: 0.01em;
    }

    /* Price — styled as a glowing pill badge */
    .product p {
      display: inline-block;
      background: linear-gradient(135deg, var(--gold) 0%, #f4811f 100%);
      color: #1a0e00;
      font-weight: 800;
      font-size: 1.05rem;
      padding: 4px 16px;
      border-radius: 50px;
      margin: 0 0 1rem;
      box-shadow: 0 4px 14px rgba(249, 199, 79, 0.32);
      letter-spacing: 0.01em;
    }

    /* Qty label */
    .product label {
      display: block;
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Qty input */
    .product input[type="number"] {
      width: 72px;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      text-align: center;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      margin-bottom: 0.9rem;
      -moz-appearance: textfield;
    }

    .product input[type="number"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.22);
    }

    .product input[type="number"]::-webkit-inner-spin-button,
    .product input[type="number"]::-webkit-outer-spin-button {
      opacity: 0.6;
    }

    /* Product image */
    .product img {
      width: 100%;
      height: 170px;
      object-fit: cover;
      border-radius: var(--radius) var(--radius) 0 0;
      display: block;
      margin: -1.8rem -1.3rem 1.2rem;
      width: calc(100% + 2.6rem);
      transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      filter: brightness(0.92) saturate(1.1);
    }

    .product:hover img {
      transform: scale(1.07);
      filter: brightness(1) saturate(1.2);
    }

    /* Add to cart button */
    .product button {
      width: 100%;
      padding: 0.68rem 1rem;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dk) 100%);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      box-shadow: 0 4px 18px rgba(108, 99, 255, 0.38);
      transition: var(--trans);
      position: relative;
      overflow: hidden;
    }

    .product button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.14), transparent 60%);
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .product button:hover {
      background: linear-gradient(135deg, #8480ff 0%, var(--primary) 100%);
      box-shadow: 0 8px 28px rgba(108, 99, 255, 0.54);
      transform: translateY(-2px);
    }

    .product button:hover::before {
      opacity: 1;
    }

    .product button:active {
      transform: translateY(0) scale(0.97);
    }

    /* ── CART ── */
    #cart {
      margin: 2.8rem auto 0;
      padding: 1.8rem 2rem;
      background: rgba(67, 233, 123, 0.055);
      border: 1.5px solid rgba(67, 233, 123, 0.28);
      border-radius: var(--radius);
      max-width: 580px;
      box-shadow: 0 8px 32px rgba(67, 233, 123, 0.08), 0 2px 10px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    #cart h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #a8f5c4;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(67, 233, 123, 0.2);
    }

    #cartItems {
      padding: 0;
      margin-bottom: 1rem;
    }

    #cartItems li {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.85rem;
      margin-bottom: 0.45rem;
      background: rgba(255, 255, 255, 0.04);
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.91rem;
      color: var(--text);
      font-weight: 500;
      transition: background 0.2s ease;
    }

    #cartItems li:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    #cart>p {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-muted);
      text-align: right;
      margin-top: 0.5rem;
    }

    #cart>p strong {
      color: var(--text);
    }

    #totalPrice {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--green);
    }

    /* Remove button */
    .remove-btn {
      color: var(--accent);
      cursor: pointer;
      font-size: 1rem;
      opacity: 0.65;
      transition: opacity 0.2s ease, transform 0.2s ease;
      flex-shrink: 0;
      margin-left: 0.6rem;
    }

    .remove-btn:hover {
      opacity: 1;
      transform: scale(1.25) rotate(8deg);
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .products {
        gap: 1.1rem;
        padding: 0 0.8rem;
      }

      .product {
        width: 100%;
        max-width: 310px;
      }

      #cart {
        margin: 2rem 0.8rem 0;
        padding: 1.3rem 1rem;
      }
    }
  </style>
</head>

<body>

  <h1>SmartCart</h1>

  <div class="products">
    <div class="product">
      <img src="phone_case.png" alt="Phone Case" />
      <h3>Phone Case</h3>
      <p>₹199</p>
      <label>Qty:</label>
      <input type="number" id="qtyA" value="1" min="1" />
      <button onclick="addToCart('Phone Case', 199, 'qtyA')">Add</button>
    </div>

    <div class="product">
      <img src="wireless_mouse.png" alt="Wireless Mouse" />
      <h3>Wireless Mouse</h3>
      <p>₹499</p>
      <label>Qty:</label>
      <input type="number" id="qtyB" value="1" min="1" />
      <button onclick="addToCart('Wireless Mouse', 499, 'qtyB')">Add</button>
    </div>

    <div class="product">
      <img src="bluetooth_speaker.png" alt="Bluetooth Speaker" />
      <h3>Bluetooth Speaker</h3>
      <p>₹899</p>
      <label>Qty:</label>
      <input type="number" id="qtyC" value="1" min="1" />
      <button onclick="addToCart('Bluetooth Speaker', 899, 'qtyC')">Add</button>
    </div>
  </div>

  <div id="cart">
    <h2>🛒 Your Cart</h2>
    <ul id="cartItems"></ul>
    <p><strong>Total:</strong> ₹<span id="totalPrice">0</span></p>
  </div>

  <script>
    let cart = [];
    let total = 0;

    function addToCart(item, price, qtyId) {
      const quantity = parseInt(document.getElementById(qtyId).value);
      cart.push({ item, price, quantity });
      updateCart();
    }

    function updateCart() {
      const cartList = document.getElementById('cartItems');
      const totalDisplay = document.getElementById('totalPrice');
      cartList.innerHTML = '';
      total = 0;

      cart.forEach((product, index) => {
        const itemTotal = product.price * product.quantity;
        total += itemTotal;
        const li = document.createElement('li');
        li.textContent = `${product.item} × ${product.quantity} = ₹${itemTotal}`;
        const removeBtn = document.createElement('span');
        removeBtn.textContent = '❌';
        removeBtn.className = 'remove-btn';
        removeBtn.onclick = () => removeItem(index);
        li.appendChild(removeBtn);
        cartList.appendChild(li);
      });

      totalDisplay.textContent = total;
    }

    function removeItem(index) {
      cart.splice(index, 1);
      updateCart();
    }
  </script>

</body>

</html>
